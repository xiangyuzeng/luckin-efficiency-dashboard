name: refresh-realtime

# Manual-only fallback path. The canonical refresh runs in Docker on an
# internal host with MySQL VPC reach (see pipeline/docker-compose.yml,
# */15 cron handled by APScheduler). The schedule trigger was removed
# because GitHub-hosted runners can't reach the production RDS; kept as
# workflow_dispatch only for future revival.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Don't run two realtime refreshes at the same time — last write wins, no race.
  group: refresh-realtime
  cancel-in-progress: false

jobs:
  realtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline deps
        run: pip install -r pipeline/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Git identity
        run: |
          git config user.name  "luckin-efficiency-bot"
          git config user.email "noreply@luckincoffee.com"

      - name: Refresh realtime payload
        env:
          AWS_REGION: us-east-1
          MYSQL_SECRET_ID: collector/mysql
        run: bash pipeline/refresh_realtime.sh
