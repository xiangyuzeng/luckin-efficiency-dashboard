# Run from the pipeline/ directory:
#   docker compose up -d --build
# .env must live next to this file (see .env.example).

# Pinned project name so `docker compose up` here doesn't tear down
# the sibling luckin-store-ops-pipeline container (both repos use a
# `pipeline/` subdir, so Compose's default project name collides).
name: luckin-efficiency-pipeline

services:
  pipeline:
    build:
      context: ..
      dockerfile: pipeline/Dockerfile
    container_name: luckin-efficiency-pipeline
    env_file: .env
    restart: always
    volumes:
      - ./logs:/workspace/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
